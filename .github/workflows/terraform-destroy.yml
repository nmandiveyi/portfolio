name: Terraform destroy

concurrency:
  group: terraform-prod-${{ github.repository }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: infra/environments/prod

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type destroy-prod to irrevocably destroy managed infrastructure.'
        required: true
        type: string

jobs:
  destroy:
    name: Terraform destroy
    if: ${{ github.ref == 'refs/heads/main' }}
    environment: production-destroy
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
      TF_VAR_do_token: ${{ secrets.TF_VAR_DO_TOKEN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_enabled: ${{ secrets.TF_VAR_CLOUDFLARE_ENABLED }}
      TF_VAR_cloudflare_dns_enabled: ${{ secrets.TF_VAR_CLOUDFLARE_DNS_ENABLED }}
      TF_VAR_cloudflare_proxy_enabled: ${{ secrets.TF_VAR_CLOUDFLARE_PROXY_ENABLED }}
      TF_VAR_cloudflare_waf_enabled: ${{ secrets.TF_VAR_CLOUDFLARE_WAF_ENABLED }}
      TF_VAR_cloudflare_scraper_asns: ${{ secrets.TF_VAR_CLOUDFLARE_SCRAPER_ASNS }}

    steps:
      - uses: actions/checkout@v4

      - name: Confirm typed destroy phrase
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.confirmation }}" != "destroy-prod" ]; then
            echo "Refusing to run — input confirmation must equal the literal destroy-prod" >&2
            exit 1
          fi

      - name: Validate Terraform secrets
        working-directory: ${{ github.workspace }}
        run: bash infra/scripts/ci/validate-required-config.sh terraform

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan destroy
        run: terraform plan -destroy -lock-timeout=300s -no-color -out=destroy.tfplan

      - name: Terraform apply destroy
        run: terraform apply -lock-timeout=300s -auto-approve destroy.tfplan
