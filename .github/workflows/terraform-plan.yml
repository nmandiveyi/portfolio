name: Terraform plan

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.repository }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: infra/environments/prod

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - 'infra/environments/prod/**'
      - 'infra/environments/bootstrap-state-bucket/**'
      - 'infra/modules/**'
      - 'infra/scripts/ci/**'
      - '.github/workflows/terraform-plan.yml'
      - '.github/workflows/terraform-apply.yml'
      - '.github/workflows/terraform-destroy.yml'

  workflow_dispatch:

jobs:
  plan:
    name: Terraform plan
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
      TF_VAR_do_token: ${{ secrets.TF_VAR_DO_TOKEN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_enabled: ${{ secrets.TF_VAR_CLOUDFLARE_ENABLED }}
      TF_VAR_cloudflare_dns_enabled: ${{ secrets.TF_VAR_CLOUDFLARE_DNS_ENABLED }}
      TF_VAR_cloudflare_proxy_enabled: ${{ secrets.TF_VAR_CLOUDFLARE_PROXY_ENABLED }}
      TF_VAR_cloudflare_waf_enabled: ${{ secrets.TF_VAR_CLOUDFLARE_WAF_ENABLED }}
      TF_VAR_cloudflare_scraper_asns: ${{ secrets.TF_VAR_CLOUDFLARE_SCRAPER_ASNS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Terraform secrets
        working-directory: ${{ github.workspace }}
        run: bash infra/scripts/ci/validate-required-config.sh terraform

      - name: Terraform setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: Terraform fmt (recursive check)
        run: terraform fmt -check -recursive
        working-directory: ${{ github.workspace }}/infra

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: terraform_plan
        run: terraform plan -lock-timeout=120s -no-color -out=tfplan

      - name: Write plan artifact and PR comment excerpt
        if: success() || failure()
        shell: bash
        run: |
          set -eo pipefail
          cd "${GITHUB_WORKSPACE}/infra/environments/prod"
          if terraform show tfplan >/dev/null 2>&1; then
            terraform show -no-color tfplan > "${GITHUB_WORKSPACE}/plan-full.txt"
          else
            echo "(no readable plan artifact)" > "${GITHUB_WORKSPACE}/plan-full.txt"
          fi
          head -c 63000 "${GITHUB_WORKSPACE}/plan-full.txt" > "${GITHUB_WORKSPACE}/plan-comment.txt"

      - name: Upload terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.event.pull_request.number || github.run_id }}
          path: ${{ github.workspace }}/plan-full.txt
          retention-days: 7

      - name: Sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: terraform-plan-${{ github.event.pull_request.number }}
          recreate: true
          path: plan-comment.txt
